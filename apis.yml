apis:
  - aid: backupify:saas-protection-api
    name: Backupify SaaS Protection API
    description: >-
      The Backupify SaaS Protection REST API enables programmatic management of cloud-to-cloud
      backup for Microsoft 365 and Google Workspace. Covers domain listing, seat enumeration,
      and bulk seat licensing operations. Authentication uses HTTP Basic auth with API key credentials.
    humanURL: https://www.backupify.com/
