aid: backupify
name: Backupify
description: >-
  Backupify (by Datto/Kaseya) is a SaaS backup platform providing automated cloud-to-cloud
  data protection for Google Workspace and Microsoft 365. It offers seat-level backup coverage
  for users, shared mailboxes, SharePoint sites, team sites, and Microsoft Teams. The SaaS
  Protection REST API enables MSPs and enterprise IT teams to automate domain administration
  and seat licensing programmatically.
