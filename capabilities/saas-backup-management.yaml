naftiko: 1.0.0-alpha2
info:
  label: Backupify SaaS Backup Management
  description: SaaS backup management workflow for Backupify (Datto), covering domain administration and seat licensing for
    Microsoft 365 and Google Workspace. Serves MSPs and IT administrators managing cloud-to-cloud backup coverage.
  tags:
  - Backupify
  - Datto
  - SaaS Backup
  - Data Protection
  - MSP
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    BACKUPIFY_API_KEY: BACKUPIFY_API_KEY
    BACKUPIFY_API_SECRET: BACKUPIFY_API_SECRET
capability:
  consumes:
  - type: http
    namespace: backupify-saas-api
    baseUri: https://api.datto.com
    description: Backupify SaaS Protection API v1
    authentication:
      type: basic
      username: '{{BACKUPIFY_API_KEY}}'
      password: '{{BACKUPIFY_API_SECRET}}'
    resources:
    - name: domains
      path: /v1/saas/domains
      description: SaaS customer domain listing
      operations:
      - name: list-domains
        method: GET
        description: List all SaaS customer domains with IDs and subscription info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: seats
      path: /v1/saas/{saasCustomerId}/seats
      description: Seat listing for a customer
      operations:
      - name: list-seats
        method: GET
        description: List seats for a given SaaS customer
        inputParameters:
        - name: saasCustomerId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bulk-seat-change
      path: /v1/saas/{saasCustomerId}/externalSubscriptionId/bulkSeatChange
      description: Bulk seat licensing management
      operations:
      - name: bulk-seat-change
        method: PUT
        description: License, unlicense, or pause up to 100 seats at once
        inputParameters:
        - name: saasCustomerId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            seats: '{{tools.seats}}'
  exposes:
  - type: rest
    port: 8080
    namespace: backupify-backup-api
    description: Unified REST API for Backupify SaaS backup management.
    resources:
    - path: /v1/domains
      name: domains
      description: SaaS backup domains
      operations:
      - method: GET
        name: list-domains
        description: List all backup customer domains
        call: backupify-saas-api.list-domains
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{saasCustomerId}/seats
      name: seats
      description: Customer backup seats
      operations:
      - method: GET
        name: list-seats
        description: List seats for a customer
        call: backupify-saas-api.list-seats
        with:
          saasCustomerId: rest.saasCustomerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{saasCustomerId}/seats/bulk
      name: bulk-seats
      description: Bulk seat management
      operations:
      - method: PUT
        name: bulk-seat-change
        description: Bulk license/unlicense/pause seats
        call: backupify-saas-api.bulk-seat-change
        with:
          saasCustomerId: rest.saasCustomerId
          seats: rest.seats
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: backupify-backup-mcp
    transport: http
    description: MCP server for AI-assisted Backupify SaaS backup management.
    tools:
    - name: list-backup-domains
      description: List all Backupify SaaS backup domains with customer IDs and subscription information
      hints:
        readOnly: true
        openWorld: false
      call: backupify-saas-api.list-domains
      outputParameters:
      - type: object
        mapping: $.
    - name: list-backup-seats
      description: List all backup seats (users, mailboxes, sites, teams) for a specific customer
      hints:
        readOnly: true
        openWorld: false
      call: backupify-saas-api.list-seats
      with:
        saasCustomerId: tools.saasCustomerId
      outputParameters:
      - type: object
        mapping: $.
    - name: bulk-change-seat-licenses
      description: License, unlicense, or pause up to 100 backup seats for a customer in a single operation
      hints:
        readOnly: false
        idempotent: true
      call: backupify-saas-api.bulk-seat-change
      with:
        saasCustomerId: tools.saasCustomerId
        seats: tools.seats
      outputParameters:
      - type: object
        mapping: $.
