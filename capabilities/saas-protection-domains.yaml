naftiko: 1.0.0-alpha2
info:
  label: Backupify SaaS Protection API — Domains
  description: 'Backupify SaaS Protection API — Domains. 1 operations. Lead operation: Backupify SaaS Protection API List
    Domains. Self-contained Naftiko capability covering one Backupify business surface.'
  tags:
  - Backupify
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BACKUPIFY_API_KEY: BACKUPIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: saas-protection-domains
    baseUri: https://api.datto.com
    description: Backupify SaaS Protection API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: v1-saas-domains
      path: /v1/saas/domains
      operations:
      - name: listdomains
        method: GET
        description: Backupify SaaS Protection API List Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.BACKUPIFY_USER}}'
      password: '{{env.BACKUPIFY_PASS}}'
  exposes:
  - type: rest
    namespace: saas-protection-domains-rest
    port: 8080
    description: REST adapter for Backupify SaaS Protection API — Domains. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/saas/domains
      name: v1-saas-domains
      description: REST surface for v1-saas-domains.
      operations:
      - method: GET
        name: listdomains
        description: Backupify SaaS Protection API List Domains
        call: saas-protection-domains.listdomains
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: saas-protection-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Backupify SaaS Protection API — Domains. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: backupify-saas-protection-api-list
      description: Backupify SaaS Protection API List Domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: saas-protection-domains.listdomains
      outputParameters:
      - type: object
        mapping: $.
